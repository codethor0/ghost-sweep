name: Documentation task
description: Propose a documentation correction or gap fill with no app behavior change
title: "[Docs] "
labels:
  - type:docs
  - area:docs
body:
  - type: input
    id: doc_file
    attributes:
      label: Document or section
      description: Primary file path or section to update.
      placeholder: docs/contributor-onboarding.md
    validations:
      required: true

  - type: textarea
    id: stale_section
    attributes:
      label: Problem
      description: What is wrong, outdated, or missing today?
    validations:
      required: true

  - type: textarea
    id: proposed_correction
    attributes:
      label: Proposed fix
      description: What should the documentation say instead?
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: How will reviewers know the docs task is complete?
      placeholder: |
        Section X matches current implementation-status.md
        No stale commit hashes or batch references remain
    validations:
      required: true

  - type: textarea
    id: implementation_impact
    attributes:
      label: Implementation impact
      description: Confirm whether any application code must change. Docs-only tasks should say none.
      value: None. Documentation only.
    validations:
      required: true

  - type: textarea
    id: validation_needed
    attributes:
      label: Validation needed
      description: How will you verify the docs are accurate?
      placeholder: |
        Cross-check against README and implementation-status.md
        python3.11 scripts/validate_public_mvp.py (if public-mvp docs changed)
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Documentation checklist
      options:
        - label: Documentation only; no application behavior changes
          required: true
        - label: No secrets, tokens, or credentials will be committed
          required: true
        - label: No generated artifacts will be committed
          required: true
