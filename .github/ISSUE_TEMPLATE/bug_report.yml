name: Bug report
description: Report a reproducible defect with environment and validation context
title: "[Bug] "
labels:
  - type:bug
body:
  - type: markdown
    attributes:
      value: |
        Do not paste secrets, JWTs, refresh tokens, API keys, or unredacted `.env` values.
        Redact tokens in logs and screenshots before attaching output.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the defect.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, commit hash, Docker vs local, and relevant configuration.
      placeholder: |
        OS: macOS 15
        Commit: 6074691
        Setup: docker compose up backend frontend postgres redis
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably trigger the issue.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or command output
      description: Paste relevant logs with tokens redacted. Do not include secrets or credentials.
      placeholder: Include pytest, curl, or browser console output as applicable.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Attach screenshots if UI-related. Redact any tokens, emails, or credentials visible in the image.
      placeholder: Drag and drop images here or describe what you observed.

  - type: textarea
    id: validation_output
    attributes:
      label: Local validation command output
      description: Output from the verification gates you ran (optional but helpful).
      placeholder: |
        pytest -v ...
        npm test
        python3.11 scripts/validate_public_mvp.py

  - type: checkboxes
    id: scope_check
    attributes:
      label: Scope and security checklist
      options:
        - label: I confirm this issue contains no secrets or unredacted credentials
          required: true
        - label: I identified whether this affects local/Docker full-stack or the static public-MVP path only
          required: true
